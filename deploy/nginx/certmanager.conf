server {
    listen 172.22.213.249:443 ssl;
    server_name _;

    ssl_certificate C:/FCNXT/CertificatesManager/artifacts/https/NginxCertManagerCertificate-with-chain.crt;
    ssl_certificate_key C:/FCNXT/CertificatesManager/artifacts/https/NginxCertManagerprivate.key;

    root C:/FCNXT/CertificatesManager/wwwroot;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 172.22.213.249:49000 ssl;
    server_name _;

    ssl_certificate C:/FCNXT/CertificatesManager/artifacts/https/NginxCertManagerCertificate-with-chain.crt;
    ssl_certificate_key C:/FCNXT/CertificatesManager/artifacts/https/NginxCertManagerprivate.key;

    location / {
        proxy_pass http://127.0.0.1:5059;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}